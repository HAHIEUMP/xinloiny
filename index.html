<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xin lỗi bé 🥺</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: #ffe6f0;
}

.container {
    margin-top: 80px;
}

.cute {
    width: 220px;
    animation: bounce 1s infinite, shake 0.5s infinite;
}

@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

@keyframes shake {
    0% { transform: translateX(0); }
    50% { transform: translateX(5px); }
    100% { transform: translateX(0); }
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn {
    background: pink;
}

#noBtn {
    background: lightgray;
}
</style>
</head>

<body>

<div class="container">
    <img class="cute" src="https://media.giphy.com/media/ROF8OQvDmxytW/giphy.gif">

    <h1>Anh biết lỗi rùi mò 😭</h1>
    <p>Bé tha lỗi cho anh nhaaa 🥺</p>

    <button id="noBtn">Không tha 😡</button>
    <button id="yesBtn">Tha lỗi 💖</button>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let size = 18;

noBtn.addEventListener("click", function() {
    size += 10;
    yesBtn.style.fontSize = size + "px";

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

yesBtn.addEventListener("click", function() {
    window.location.href = "love.html";
});
</script>

</body>
</html>
